<!DOCTYPE html>
<html>
<head>
    <title>HTML Attributes Example</title> <!-- Title of the webpage -->
</head>
<body>

<!-- Heading with title attribute -->
<h2 title="This is a heading">HTML Attributes Example</h2>

<!-- Anchor tag using href attribute -->
<a href="https://www.google.com">Visit Google</a>

<br><br>

<!-- Image using src, alt, width and height attributes -->
<img src="https://via.placeholder.com/150"
     alt="Sample Image"
     width="150"
     height="150">

</body>
</html>
