<!DOCTYPE html>
<html>
<head>
    <title>Image Tag Example</title>
</head>
<body>

<!-- Display an image on the webpage -->
<img 
    src="https://fsa2-assets.imgix.net/assets/How-Long-Does-It-Take-to-Learn-HTML.jpg?auto=compress%2Cformat&crop=focalpoint&domain=fsa2-assets.imgix.net&fit=crop&fp-x=0.1289&fp-y=0.5322&ixlib=php-3.3.1&w=1280"  <!-- src = Path or URL of the image -->
    alt="Sample Image"                     <!-- alt = Text shown if image cannot load -->
    width="200"                            <!-- width = Image width in pixels -->
    height="200"                           <!-- height = Image height in pixels -->
    title="This is a sample image"         <!-- title = Tooltip text when mouse hovers over image -->
>

</body>
</html>
