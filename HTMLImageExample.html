<!DOCTYPE html>
<html>
<head>
    <title>Image Tag Example</title>
</head>
<body>

<!-- Display an image on the webpage -->
<img 
    src="https://via.placeholder.com/200"  <!-- src = Path or URL of the image -->
    alt="Sample Image"                     <!-- alt = Text shown if image cannot load -->
    width="200"                            <!-- width = Image width in pixels -->
    height="200"                           <!-- height = Image height in pixels -->
    title="This is a sample image"         <!-- title = Tooltip text when mouse hovers over image -->
>

</body>
</html>
